name: Citation Release Loop

on:
  schedule:
    # Daily strategy-gated release maintenance, 7:10am America/Chicago during standard time.
    - cron: "10 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: citation-release-loop
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Use public npm registry
        run: npm config set registry https://registry.npmjs.org

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build and self-heal citation surfaces
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: npm run release:self-heal

      - name: Write indexnow.txt if configured
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -n "${INDEXNOW_KEY:-}" ]; then
            printf "%s" "$INDEXNOW_KEY" > indexnow.txt
            echo "Wrote indexnow.txt"
          else
            echo "INDEXNOW_KEY secret not set; skipping indexnow.txt"
          fi

      - name: IndexNow priority ping
        continue-on-error: true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "${INDEXNOW_KEY:-}" ]; then
            echo "INDEXNOW_KEY secret not set; skipping ping"
            exit 0
          fi
          HOST="virtualagency-os.com"
          urls=$(node - <<'NODE'
          const fs = require('fs');
          const list = fs.existsSync('.build/indexnow-priority.txt') ? fs.readFileSync('.build/indexnow-priority.txt','utf8').trim().split(/\n+/).filter(Boolean).slice(0,100) : ['https://virtualagency-os.com/sitemap.xml','https://virtualagency-os.com/'];
          process.stdout.write(JSON.stringify(list));
NODE
          )
          payload=$(node - <<NODE
          const urls = $urls;
          process.stdout.write(JSON.stringify({host:'virtualagency-os.com',key:process.env.INDEXNOW_KEY,keyLocation:'https://virtualagency-os.com/indexnow.txt',urlList:urls}));
NODE
          )
          curl -sS -X POST "https://www.bing.com/indexnow" -H "Content-Type: application/json; charset=utf-8" -d "$payload" || true

      - name: Commit self-healed release surfaces if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Run strategy-gated citation release loop"
            git push
          else
            echo "No changes to commit."
          fi
