name: Credential Check - Secrets and Public Key Readiness

on:
  workflow_dispatch:
  schedule:
    - cron: '45 13 * * 1'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: bash scripts/ci_npm_install.sh
      - env:
          INDEXNOW_KEY_SECRET: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_KEY_VAR: ${{ vars.INDEXNOW_KEY }}
          INDEXNOW_KEY_SECRET_LOWER: ${{ secrets.indexnow_key }}
          INDEXNOW_KEY_VAR_LOWER: ${{ vars.indexnow_key }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL_SECRET: ${{ secrets.GSC_SITE_URL }}
          GSC_SITE_URL_VAR: ${{ vars.GSC_SITE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://virtualagency-os.com' }}
        run: |
          export INDEXNOW_KEY="${INDEXNOW_KEY_SECRET:-${INDEXNOW_KEY_VAR:-${INDEXNOW_KEY_SECRET_LOWER:-${INDEXNOW_KEY_VAR_LOWER:-}}}}"
          export GSC_SITE_URL="${GSC_SITE_URL_SECRET:-${GSC_SITE_URL_VAR:-}}"
          npm run credentials:check
