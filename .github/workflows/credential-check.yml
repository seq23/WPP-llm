name: Credential Check - Secrets and Public Key Readiness

on:
  workflow_dispatch:
  schedule:
    - cron: '45 13 * * 1'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://virtualagency-os.com' }}
        run: npm run credentials:check
