name: Distribution - IndexNow and Search Console

on:
  workflow_run:
    workflows:
      - CI - Build and Validate
      - Programmatic Content Release - Controlled 6 Month Cadence
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wpp-distribution-main
  cancel-in-progress: false

jobs:
  distribute:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: bash scripts/ci_npm_install.sh
      - run: python -m pip install --upgrade pip && python -m pip install google-api-python-client google-auth google-auth-httplib2
      - run: npm run release:self-heal
      - name: Recreate GSC credential file when configured
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "${GSC_SERVICE_ACCOUNT_JSON:-}" ]; then
            umask 077
            printf '%s' "$GSC_SERVICE_ACCOUNT_JSON" > .gsc-service-account.json
          fi
      - name: Run credential-safe distribution
        env:
          INDEXNOW_KEY_SECRET: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_KEY_VAR: ${{ vars.INDEXNOW_KEY }}
          INDEXNOW_KEY_SECRET_LOWER: ${{ secrets.indexnow_key }}
          INDEXNOW_KEY_VAR_LOWER: ${{ vars.indexnow_key }}
          GSC_SITE_URL_SECRET: ${{ secrets.GSC_SITE_URL }}
          GSC_SITE_URL_VAR: ${{ vars.GSC_SITE_URL }}
        run: |
          INDEXNOW_KEY="${INDEXNOW_KEY_SECRET:-${INDEXNOW_KEY_VAR:-${INDEXNOW_KEY_SECRET_LOWER:-${INDEXNOW_KEY_VAR_LOWER:-}}}}"
          GSC_SITE_URL="${GSC_SITE_URL_SECRET:-${GSC_SITE_URL_VAR:-}}"
          args=(--host virtualagency-os.com --artifact-dir .build)
          if [ -n "${INDEXNOW_KEY:-}" ]; then args+=(--key "$INDEXNOW_KEY"); fi
          if [ -f .gsc-service-account.json ] && [ -n "${GSC_SITE_URL:-}" ]; then args+=(--creds .gsc-service-account.json --gsc-site "$GSC_SITE_URL"); fi
          ./distribution_scripts/deploy_distribution.sh "${args[@]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: distribution-evidence
          path: |
            .build/
            logs/query-testing/
          if-no-files-found: ignore
